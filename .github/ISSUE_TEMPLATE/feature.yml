name: Feature Request
description: Propose a new capability or enhancement
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the goal. Focus on WHAT and WHY — not HOW to implement it.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What needs to exist and why it matters? 1-3 sentences.
      placeholder: "Users need the ability to filter funding opportunities by deadline proximity..."
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Outcome-based checkboxes. What would a human verify in the browser?
      placeholder: |
        - [ ] Deadline filter appears in the filter bar
        - [ ] Selecting "Next 30 days" shows only matching opportunities
      value: |
        - [ ]
    validations:
      required: true
  - type: dropdown
    id: testing-tier
    attributes:
      label: Testing Tier
      description: What level of testing does this feature require?
      options:
        - Critical (user-facing logic)
        - API (response contracts)
        - Database (queries/RPCs)
        - Pipeline (AI processing)
        - API E2E (full HTTP round-trip)
        - Browser E2E (user workflow)
        - None (config/docs only)
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which area of the application?
      options:
        - Dashboard
        - Map
        - Funding
        - Pipeline
        - Admin
        - Clients
        - Auth
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Links, mockups, screenshots, or related issues.
      placeholder: "Related to #42. See mockup at..."
    validations:
      required: false
